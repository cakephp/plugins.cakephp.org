name: 'deploy'

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Cloning repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Push to dokku
              uses: dokku/github-action@master
              with:
                  git_remote_url: 'ssh://dokku@apps.cakephp.org:22/plugins'
                  ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
